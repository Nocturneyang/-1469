<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Monitor · 全域观察窗</title>
  <meta name="description" content="多平台社媒监控数据大屏面板">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.0/build/qrcode.min.js"></script>
  <style>
    :root {
      --bg: #e0e5ec;
      --bg-gradient: linear-gradient(145deg, #f0f5fd, #caccd4);
      --t: #2d3748;
      --t2: #4a5568;
      --t3: #718096;
      --red: #fc8181;
      --wa-green: #25D366;
      --tg-blue: #0088cc;
      --p: #6b46c1;
      /* Modern deep purple */
      --p-light: #9f7aea;
      --shadow-light: #ffffff;
      --shadow-dark: #a3b1c6;

      --r: 24px;
      --rs: 14px;

      --out-shadow: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light);
      --out-shadow-hover: 12px 12px 20px var(--shadow-dark), -12px -12px 20px var(--shadow-light);
      --in-shadow: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light);
      --in-shadow-active: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scrollbar-width: thin;
      scrollbar-color: var(--t3) transparent;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--t);
      min-height: 100vh;
      overflow-x: hidden;
      font-size: 15px;
      line-height: 1.6;
    }

    h1,
    h2,
    h3,
    .stat-val {
      font-family: 'Outfit', sans-serif;
    }

    /* ── 布局骨架 ── */
    .app {
      display: flex;
      min-height: 100vh;
      position: relative;
    }

    .sidebar {
      width: 280px;
      min-height: 100vh;
      background: var(--bg-gradient);
      box-shadow: 9px 0 16px rgba(163, 177, 198, 0.4);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 200;
    }

    .brand {
      padding: 40px 32px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: var(--bg);
      box-shadow: var(--out-shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
      background: linear-gradient(145deg, #f0f5fd, #caccd4);
    }

    .brand h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--p);
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .brand h1 span {
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      color: var(--t3);
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .nav {
      padding: 12px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      border-radius: var(--rs);
      cursor: pointer;
      color: var(--t2);
      font-size: 15px;
      font-weight: 700;
      transition: all .4s cubic-bezier(0.4, 0, 0.2, 1);
      user-select: none;
    }

    .nav-item:hover {
      color: var(--p);
      transform: translateY(-2px);
      box-shadow: var(--out-shadow);
    }

    .nav-item.active {
      color: var(--p);
      background: var(--bg);
      box-shadow: var(--in-shadow-active);
      transform: translateY(1px);
    }

    .main {
      margin-left: 280px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 32px 48px;
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(224, 229, 236, 0.85);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--t);
    }

    .status-pill {
      font-size: 14px;
      font-weight: 700;
      color: var(--t2);
      background: var(--bg);
      padding: 12px 24px;
      border-radius: 30px;
      box-shadow: var(--in-shadow);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--wa-green);
      box-shadow: 0 0 12px var(--wa-green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7);
      }

      70% {
        box-shadow: 0 0 0 10px rgba(37, 211, 102, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(37, 211, 102, 0);
      }
    }

    .content {
      padding: 0 48px 48px;
      flex: 1;
      position: relative;
    }

    .view {
      display: none;
      opacity: 0;
      transform: translateY(15px);
      transition: all .5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .view.active {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    /* ── 组件：卡片面板 ── */
    .panel {
      background: var(--bg);
      border-radius: var(--r);
      box-shadow: var(--out-shadow);
      padding: 36px;
      transition: all .4s ease;
      margin-bottom: 32px;
    }

    .panel:hover {
      box-shadow: var(--out-shadow-hover);
    }

    .panel-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--t2);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* ── 仪表盘网格 ── */
    .grid-4 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 32px;
    }

    .stat-card {
      border-radius: var(--r);
      background: var(--bg-gradient);
      box-shadow: var(--out-shadow);
      padding: 32px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 16px;
      box-shadow: var(--in-shadow);
      pointer-events: none;
    }

    .stat-lbl {
      font-size: 14px;
      color: var(--t2);
      font-weight: 700;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      z-index: 2;
    }

    .stat-val {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -2px;
      color: var(--t);
      position: relative;
      z-index: 2;
      line-height: 1.1;
    }

    .color-p .stat-val {
      color: var(--p);
    }

    .color-wa .stat-val {
      color: var(--wa-green);
    }

    .color-tg .stat-val {
      color: var(--tg-blue);
    }

    .color-m .stat-val {
      color: var(--t3);
    }

    /* ── 过滤器 ── */
    .filters {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      padding: 8px;
      border-radius: 28px;
      background: var(--bg);
      box-shadow: var(--in-shadow-active);
      width: max-content;
    }

    .f-btn {
      padding: 12px 28px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--t2);
      transition: all .3s ease;
      font-family: inherit;
    }

    .f-btn.active {
      background: var(--bg);
      color: var(--p);
      box-shadow: var(--out-shadow);
    }

    /* ── 消息瀑布流/表格 ── */
    .feed-container {
      border-radius: var(--r);
      box-shadow: var(--in-shadow);
      padding: 16px;
      background: var(--bg);
      min-height: 400px;
    }

    .msg-item {
      display: flex;
      gap: 20px;
      padding: 24px;
      border-radius: 16px;
      margin-bottom: 16px;
      background: var(--bg);
      box-shadow: var(--out-shadow);
      transition: transform .3s ease;
    }

    .msg-item:hover {
      transform: translateY(-2px);
    }

    .msg-item:last-child {
      margin-bottom: 0;
    }

    .m-plat {
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 14px;
      box-shadow: var(--in-shadow-active);
      flex-shrink: 0;
      background: var(--bg);
    }

    .m-body {
      flex: 1;
      min-width: 0;
    }

    .m-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .m-group {
      font-size: 16px;
      font-weight: 800;
      color: var(--t);
    }

    .m-sender {
      font-size: 14px;
      font-weight: 600;
      color: var(--p);
      background: rgba(107, 70, 193, 0.1);
      padding: 4px 12px;
      border-radius: 12px;
    }

    .m-time {
      font-size: 13px;
      font-weight: 600;
      color: var(--t3);
    }

    .m-text {
      font-size: 15px;
      color: var(--t2);
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }

    /* 图片附录展示 */
    .m-media {
      margin-top: 16px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--in-shadow);
      display: inline-block;
      max-width: 100%;
      border: 6px solid var(--bg);
    }

    .m-media img {
      display: block;
      max-width: 300px;
      max-height: 300px;
      object-fit: cover;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity .3s;
    }

    .m-media img:hover {
      opacity: 0.8;
    }

    /* 占位与动画 */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--t3);
      font-weight: 700;
      font-size: 16px;
    }

    .loading-pulse {
      animation: fl 1.5s infinite;
      opacity: 0.5;
    }

    @keyframes fl {

      0%,
      100% {
        opacity: 0.3;
      }

      50% {
        opacity: 0.7;
      }
    }

    /* ── 账号系统 ── */
    .acc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }
    
    .acc-card {
      background: var(--bg);
      border-radius: var(--r);
      box-shadow: var(--out-shadow);
      padding: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
    }

    .acc-status {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(0,0,0,0.05);
    }
    .acc-status.online { background: rgba(37, 211, 102, 0.15); color: var(--wa-green); }
    .acc-status.qr { background: rgba(252, 129, 129, 0.15); color: var(--red); }
    
    .acc-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }
    
    .acc-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--t);
      margin-bottom: 6px;
    }
    
    .qr-container {
      margin: 20px 0;
      padding: 12px;
      background: white;
      border-radius: 12px;
      box-shadow: var(--in-shadow-active);
    }
    .qr-container canvas {
      display: block;
      max-width: 100%;
    }

    .btn-action {
      margin-top: auto;
      padding: 10px 24px;
      border-radius: 20px;
      background: var(--bg);
      box-shadow: var(--out-shadow);
      border: none;
      color: var(--t2);
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-action:hover { box-shadow: var(--out-shadow-hover); color: var(--red); }
    .btn-action:active { box-shadow: var(--in-shadow-active); }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000;
      display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--bg); border-radius: var(--r); padding: 32px; width: 400px;
      box-shadow: var(--out-shadow); position: relative;
    }
    .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 24px; color: var(--t); }
    .form-group { margin-bottom: 16px; text-align: left; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--t2); margin-bottom: 8px; }
    .form-control { width: 100%; padding: 12px 16px; border-radius: 12px; border: none; background: white; font-family: inherit; font-size: 15px; box-shadow: var(--in-shadow-active); }
    .btn-primary { width: 100%; padding: 14px; border-radius: 16px; background: var(--p); color: white; border: none; font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 12px rgba(107,70,193,0.3); transition: all .2s; }
    .btn-primary:hover { background: var(--p-light); transform: translateY(-1px); }
    .modal-close { position: absolute; top: 20px; right: 24px; font-size: 24px; cursor: pointer; color: var(--t3); }
  </style>
</head>

<body>
  <!-- Modal -->
  <div class="modal-overlay" id="add-modal">
    <div class="modal">
      <div class="modal-close" onclick="closeAddModal()">&times;</div>
      <div class="modal-title">新增采集节点</div>
      <div class="form-group">
        <label>选择平台</label>
        <select id="acc-platform" class="form-control" onchange="toggleTokenInput()">
          <option value="whatsapp">🟢 WhatsApp</option>
          <option value="telegram">🔵 Telegram</option>
        </select>
      </div>
      <div class="form-group">
        <label>账号标识ID (仅限英文数字，如: work_01)</label>
        <input type="text" id="acc-id" class="form-control" placeholder="自定义一个唯一ID" />
      </div>
      <div class="form-group" id="tg-token-grp" style="display:none;">
        <label>Telegram Bot Token</label>
        <input type="text" id="acc-token" class="form-control" placeholder="123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11" />
      </div>
      <button class="btn-primary" onclick="submitCreateAccount()">确认添加并启动</button>
    </div>
  </div>

  <div class="app">

    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="brand">
        <div class="logo-icon">🔮</div>
        <h1>Social Monitor<span>Data Pipeline</span></h1>
      </div>
      <nav class="nav">
        <div class="nav-item active" onclick="switchView('dashboard')">📊 全盘态势 (Dashboard)</div>
        <div class="nav-item" onclick="switchView('feed')">💬 原始数据流 (Raw Feed)</div>
        <div class="nav-item" onclick="switchView('accounts')">👥 帐号管理 (Accounts)</div>
      </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="main">
      <header class="header">
        <div class="header-title" id="page-title">全盘态势 Dashboard</div>
        <div class="status-pill">
          <div class="pulse"></div> API Server 在线守护
        </div>
      </header>

      <div class="content">

        <!-- 视图 1: Dashboard -->
        <div id="view-dashboard" class="view active">
          <div class="panel">
            <div class="panel-title">📡 数据采集吞吐量</div>
            <div class="grid-4" id="stats-grid">
              <div class="stat-card color-p">
                <div class="stat-lbl">实时总入库数</div>
                <div class="stat-val loading-pulse" id="st-total">--</div>
              </div>
              <div class="stat-card color-wa">
                <div class="stat-lbl">WhatsApp 规模</div>
                <div class="stat-val loading-pulse" id="st-wa">--</div>
              </div>
              <div class="stat-card color-tg">
                <div class="stat-lbl">Telegram 规模</div>
                <div class="stat-val loading-pulse" id="st-tg">--</div>
              </div>
              <div class="stat-card color-m">
                <div class="stat-lbl">含媒体附件数</div>
                <div class="stat-val loading-pulse" id="st-media">--</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 视图 2: Raw Feed -->
        <div id="view-feed" class="view">
          <div class="filters">
            <button class="f-btn active" onclick="setFilter('all')">🌈 全渠道</button>
            <button class="f-btn" onclick="setFilter('whatsapp')">🟢 WhatsApp</button>
            <button class="f-btn" onclick="setFilter('telegram')">🔵 Telegram</button>
          </div>

          <div class="feed-container" id="feed-box">
            <div class="empty-state loading-pulse">正在穿梭底层数据网络...</div>
          </div>
        </div>

        <!-- 视图 3: Accounts -->
        <div id="view-accounts" class="view">
          <div class="panel">
            <div class="panel-title" style="justify-content: space-between;">
              <span>👥 采集帐号池状态</span>
              <button class="f-btn active" onclick="openAddModal()">+ 新增帐号系统</button>
            </div>
            <div class="acc-grid" id="accounts-box">
              <div class="empty-state loading-pulse" style="grid-column: 1 / -1;">获取帐号信息中...</div>
            </div>
          </div>
        </div>

      </div>
    </main>

  </div>

  <script>
    // UI 路由逻辑
    function switchView(viewName) {
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      event.currentTarget.classList.add('active');

      document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
      document.getElementById('view-' + viewName).classList.add('active');

      const titles = {
        'dashboard': '全盘态势 Dashboard',
        'feed': '原始数据流 Raw Feed',
        'accounts': '帐号管理 Accounts'
      };
      document.getElementById('page-title').innerText = titles[viewName];
      if (viewName === 'accounts') fetchAccounts();
    }

    // 核心数据拉取
    const API_BASE = window.location.origin + '/api';

    async function fetchStats() {
      try {
        const res = await fetch(API_BASE + '/stats');
        const data = await res.json();
        if (data.success) {
          document.getElementById('st-total').innerText = data.total;
          document.getElementById('st-total').classList.remove('loading-pulse');
          document.getElementById('st-wa').innerText = data.platforms.whatsapp || 0;
          document.getElementById('st-wa').classList.remove('loading-pulse');
          document.getElementById('st-tg').innerText = data.platforms.telegram || 0;
          document.getElementById('st-tg').classList.remove('loading-pulse');
          document.getElementById('st-media').innerText = data.withMedia || 0;
          document.getElementById('st-media').classList.remove('loading-pulse');
        }
      } catch (e) { console.error('Stats block error', e); }
    }

    let currentFilter = 'all';

    function setFilter(pf) {
      currentFilter = pf;
      document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
      event.currentTarget.classList.add('active');
      fetchFeed();
    }

    async function fetchFeed() {
      const box = document.getElementById('feed-box');
      try {
        const res = await fetch(API_BASE + '/messages?limit=25&platform=' + currentFilter);
        const data = await res.json();

        if (!data.success || data.data.length === 0) {
          box.innerHTML = `<div class="empty-state">📦 暂未捕获到对应的数据记录</div>`;
          return;
        }

        let html = '';
        data.data.forEach(m => {
          const isWa = m.platform === 'whatsapp';
          const icon = isWa ? '🟢' : '🔵';
          const timeStr = new Date(m.timestamp).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });

          let mediaHtml = '';
          if (m.has_media && m.media_path) {
            mediaHtml = `
          <div class="m-media">
             <img src="/${m.media_path}" alt="attachment" onclick="window.open(this.src)" />
          </div>
        `;
          }

          html += `
        <div class="msg-item">
          <div class="m-plat">${icon}</div>
          <div class="m-body">
            <div class="m-head">
              <div style="display:flex;align-items:center;gap:12px">
                <span class="m-group">${m.group_name || '未知群组'}</span>
                <span class="m-sender">${m.sender_name || 'Unknown'}</span>
              </div>
              <div class="m-time">${timeStr}</div>
            </div>
            <div class="m-text">${m.content}</div>
            ${mediaHtml}
          </div>
        </div>
      `;
        });
        box.innerHTML = html;
      } catch (e) {
        box.innerHTML = `<div class="empty-state">⚠️ 接口通信受阻</div>`;
      }
    }

    async function fetchAccounts() {
      if (document.getElementById('view-accounts').classList.contains('active') === false) return;
      const box = document.getElementById('accounts-box');
      try {
        const res = await fetch(API_BASE + '/accounts');
        const data = await res.json();
        
        if (!data.success || data.data.length === 0) {
          box.innerHTML = `<div class="empty-state" style="grid-column: 1 / -1;">暂无已配置的采集端账号。请在 ecosystem.config.js 开启后重启系统。</div>`;
          return;
        }

        box.innerHTML = '';
        data.data.forEach(acc => {
          const isWa = acc.platform === 'whatsapp';
          const icon = isWa ? '🟢 WA' : '🔵 TG';
          
          let stClass = '';
          let stText = acc.status;
          if (acc.status === 'authenticated') { stClass = 'online'; stText = '在线'; }
          else if (acc.status === 'qr') { stClass = 'qr'; stText = '待扫码'; }
          else if (acc.status === 'initializing') { stText = '初始化中'; }

          const card = document.createElement('div');
          card.className = 'acc-card';
          
          let contentHtml = `
            <div class="acc-status ${stClass}">${stText}</div>
            <div class="acc-icon">${icon}</div>
            <div class="acc-name">${acc.pushname || acc.id}</div>
            <div style="font-size:12px; color:var(--t3); margin-bottom:12px;">ID: ${acc.id}</div>
          `;

          if (acc.status === 'qr' && acc.qr_code && isWa) {
            contentHtml += `<div class="qr-container"><canvas id="qr-${acc.id}"></canvas></div>
                            <div style="font-size:13px; color:var(--t2); margin-top:8px">请使用 App 扫码登录</div>`;
          } else if (acc.status === 'authenticated') {
            contentHtml += `<button class="btn-action" onclick="logoutAccount('${acc.id}')">下线退出</button>`;
          }

          card.innerHTML = contentHtml;
          box.appendChild(card);

          // 渲染QR
          if (acc.status === 'qr' && acc.qr_code && isWa) {
            const canvas = document.getElementById(`qr-${acc.id}`);
            QRCode.toCanvas(canvas, acc.qr_code, { width: 180, margin: 1, color: { dark: '#2d3748', light: '#ffffff' } }, function (error) {
              if (error) console.error(error);
            });
          }
        });

      } catch (e) {
        console.error('Fetch accounts error', e);
      }
    }

    async function logoutAccount(id) {
      if(!confirm('确定要注销下线该账号吗？后台需要几秒重置。')) return;
      try {
        const res = await fetch(API_BASE + '/accounts/logout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id })
        });
        const data = await res.json();
        if(data.success) {
          alert('下线指令已发送！');
          fetchAccounts();
        } else {
          alert('下线失败：' + data.error);
        }
      } catch (e) { alert('网络错误'); }
    }

    // Modal logic
    function openAddModal() {
      document.getElementById('add-modal').style.display = 'flex';
      toggleTokenInput();
    }
    function closeAddModal() {
      document.getElementById('add-modal').style.display = 'none';
    }
    function toggleTokenInput() {
      const p = document.getElementById('acc-platform').value;
      document.getElementById('tg-token-grp').style.display = p === 'telegram' ? 'block' : 'none';
    }
    async function submitCreateAccount() {
      const platform = document.getElementById('acc-platform').value;
      const id = document.getElementById('acc-id').value.trim();
      const token = document.getElementById('acc-token').value.trim();
      
      if (!id) return alert('请输入账号标识!');
      if (platform === 'telegram' && !token) return alert('请输入机器人的 Token!');

      try {
        const res = await fetch(API_BASE + '/accounts/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ platform, id, token })
        });
        const data = await res.json();
        if (data.success) {
          alert('配置已追加，新进程启动中！请耐心等待扫码...');
          closeAddModal();
          // Clear inputs
          document.getElementById('acc-id').value = '';
          document.getElementById('acc-token').value = '';
          fetchAccounts();
        } else {
          alert('创建失败：' + data.error);
        }
      } catch(e) {
        alert('无法连接到服务器');
      }
    }

    // 启动循环心跳
    fetchStats();
    fetchFeed();
    setInterval(fetchStats, 5000);
    setInterval(fetchFeed, 5000);
    setInterval(fetchAccounts, 3000);

  </script>
</body>

</html>
